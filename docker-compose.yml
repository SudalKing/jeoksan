services:

  # PostgreSQL
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jeoksan
      POSTGRES_USER: jeoksan
      POSTGRES_PASSWORD: jeoksan
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    volumes:
      - jeoksan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeoksan -d jeoksan"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Jeoksan Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://jeoksan:jeoksan@db:5432/jeoksan
      TZ: Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  jeoksan_pgdata:
